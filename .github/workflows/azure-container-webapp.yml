name: Build and deploy a container to an Azure Web App

env:
  AZURE_WEBAPP_NAME: 'webapp-naftali'

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login no Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login no ACR
        run: az acr login --name acraula123456
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker
        run: |
         docker build -t acraula123456.azurecr.io/minha-app:latest .

      - name: Push Docker
        run: |
          docker push acraula123456.azurecr.io/minha-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
